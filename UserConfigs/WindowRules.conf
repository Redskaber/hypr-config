# @path: ~/.config/hypr/UserConfigs/WindowRules.conf
# @author: redskaber (enhanced with vendor defaults best practices)
# @description: Comprehensive window rules for Nix-config stack with modern Hyprland syntax
# @note: For Hyprland > 0.52.1

################################################################################
# 🏷️ TAGGING SYSTEM
################################################################################

# Browser tags - for consistent browser behavior
windowrule = tag +browser, match:class ^(zen-browser|google-chrome-stable|firefox|org.mozilla.firefox|firefox-esr|chromium|brave-browser)$

# Terminal tags - all terminal emulators
windowrule = tag +terminal, match:class ^(kitty|wezterm|alacritty|foot)$

# IM tags - instant messaging applications
windowrule = tag +im, match:class ^(wechat|qq|discord|vesktop|slack|teams-for-linux|element|org.telegram.desktop)$

# Utility tags - productivity and system tools
windowrule = tag +utils, match:class ^(obsidian|emacs|nemo|pavucontrol|nm-connection-editor|rbw|clash-verge|qbittorrent|code|zeditor|wps|waypaper|virt-manager|fcitx5|seahorse|org.gnome.TextEditor|mousepad|org.gnome.Calculator)$

# Media tags - audio/video players and editors
windowrule = tag +media, match:class ^(obs|mpv|ncspot|easyeffects|lx-music-desktop|vlc|audacious)$

# Game tags - gaming platforms and games
windowrule = tag +games, match:class ^(prismlauncher|lutris|steam|steam_app_\d+|gamescope)$

# File manager tags - all file explorers
windowrule = tag +file-manager, match:class ^(nemo|org.gnome.Nautilus|thunar|pcmanfm-qt)$

# Notification tags - notification daemons
windowrule = tag +notif, match:class ^(swaync-control-center|swaync-notification-window)$

################################################################################
# 📌 WINDOW POSITIONING & CENTERING
################################################################################

# Center specific windows
windowrule = center on, match:tag im
windowrule = center on, match:tag utils
windowrule = center on, match:class ^(pavucontrol|nm-connection-editor|rbw)$
windowrule = center on, match:title ^(Authentication Required|Keybindings|ROG Control)$

# Special positioning rules
windowrule = move (monitor_w*0.72) (monitor_h*0.07), match:title ^Picture-in-Picture$

# Size rules
windowrule = size 800 600, match:class ^(pavucontrol|nm-connection-editor|rbw)$
windowrule = size (monitor_w*0.6) (monitor_h*0.7), match:tag im
windowrule = size (monitor_w*0.7) (monitor_h*0.7), match:tag utils

# Dialog and popup sizing
windowrule = size (monitor_w*0.7) (monitor_h*0.6), match:title ^(Save As|Add Folder to Workspace)$
windowrule = size (monitor_w*0.7) (monitor_h*0.6), match:initial_title ^(Open Files)$

################################################################################
# 🪟 FLOATING BEHAVIOR
################################################################################

# Float by tag
windowrule = float on, match:tag im
windowrule = float on, match:tag utils
windowrule = float on, match:tag file-manager
windowrule = float on, match:tag notif

# Float specific apps
windowrule = float on, match:class mpv
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:title ^Picture-in-Picture$

# Float dialogs but not main windows
windowrule = float on, match:class ^(codium|VSCode|code)$, match:title negative:^(.*(codium|VSCode|code).*)$
windowrule = float on, match:class ^(steam)$, match:title negative:^(Steam)$
windowrule = float on, match:class ^(thunar)$, match:title negative:^(.*Thunar.*)$

################################################################################
# 🎨 VISUAL EFFECTS
################################################################################

# Opacity rules (active/inactive)
windowrule = opacity 0.92 0.85, match:tag browser
windowrule = opacity 0.90 0.80, match:tag im
windowrule = opacity 0.95 0.85, match:tag media
windowrule = opacity 0.85 0.75, match:tag utils
windowrule = opacity 0.9 0.7, match:tag terminal
windowrule = opacity 0.95 0.75, match:title ^Picture-in-Picture$

# Blur optimization
windowrule = no_blur on, match:class ^(mpv|vlc)$
windowrule = no_blur on, match:tag games

# Special visual effects
windowrule = pin on, match:title ^Picture-in-Picture$
windowrule = keep_aspect_ratio on, match:title ^Picture-in-Picture$
windowrule = dim_around on, match:title ^Picture-in-Picture$

################################################################################
# ⚙️ SPECIAL BEHAVIORS
################################################################################

# Fullscreen behavior
windowrule = idle_inhibit fullscreen, match:fullscreen true

# Prevent focus stealing
windowrule = no_initial_focus on, match:class ^(wechat|qq|jetbrains-.+)$
windowrule = no_initial_focus on, match:title ^(wind.*)$

# XWayland compatibility
windowrule = rounding 0, match:xwayland true
windowrule = no_anim on, match:xwayland true

# Special fixes
windowrule = keep_aspect_ratio on, match:title ^Picture-in-Picture$
windowrule = suppress_event activate, match:class ^(vesktop)$  # Prevent Discord from stealing focus

################################################################################
# 🧱 LAYER RULES
################################################################################

# Common UI elements
layerrule = blur on, match:namespace ^(rofi|wlogout|quickshell:overview)$
layerrule = blur on, match:namespace ^(notifications|swaync)$

# Special layer behavior
layerrule = ignore_alpha 0.5, match:namespace quickshell:overview
layerrule = dim_around on, match:namespace ^(rofi|wlogout)$

# Notifications should not block input
layerrule = above_lock 1, match:namespace notifications


