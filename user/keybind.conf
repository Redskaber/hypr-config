# user/keybind.conf — User keybind additions & overrides
# Sourced after sys/keybind.conf — later wins.
# $M, $M_terminal, $M_file_manager, $S available from bootstrap/const.conf
# and sys/const.conf (Stage 0).
#
# To REMAP an existing bind, unbind it first (case-sensitive):
#
#   unbind = $M, Return, Open terminal, exec, $M_terminal
#   bindd  = $M, Return, Open terminal, exec, ghostty
#
# To ADD a new bind (include a description for KeyBinds.sh search):
#   bindd = $M, Z, My Z app, exec, myapp

# ── Passthrough submap (for VMs) ─────────────────────────────
# bind = $mainMod ALT, P, submap, passthru
# submap = passthru
# bind  = $mainMod ALT, P, submap, reset
# submap = reset
