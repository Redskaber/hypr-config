# user/keybinds.conf — User keybind additions & overrides
# To REMAP an existing bind, unbind it first (case-sensitive):
#
#   unbind = $mainMod, Return, Open terminal, exec, $M_terminal
#   bindd  = $mainMod, Return, Open terminal, exec, ghostty
#
# To ADD a new bind (include a description for KeyBinds.sh search):
#   bindd = $mainMod, Z, My Z app, exec, myapp
#
# $mainMod / $scriptsDir / $S available from core/keybinds.conf.
# $M_terminal / $files available from user/defaults.conf.

# ── Passthrough submap (for VMs) ─────────────────────────────
# bind = $mainMod ALT, P, submap, passthru
# submap = passthru
# bind  = $mainMod ALT, P, submap, reset
# submap = reset
