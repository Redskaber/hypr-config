# user/env.conf — User environment variable overrides
# Additions here take precedence over core/env.conf.
# Never edit core/env.conf directly — updates will overwrite it.
#
# Common uses:
#   Set EDITOR:
#     env = EDITOR, nvim
#
#   Enable NVIDIA:
#     env = LIBVA_DRIVER_NAME,          nvidia
#     env = __GLX_VENDOR_LIBRARY_NAME,  nvidia
#     env = NVD_BACKEND,               direct
#
#   HiDPI (e.g. 150% scaling):
#     env = GDK_SCALE,        1.5
#     env = QT_SCALE_FACTOR,  1.5
#
#   Default browser:
#     env = BROWSER, google-chrome-stable
#
#   Wallpaper directory (used by WallpaperSelect.sh / WallpaperRandom.sh):
#     env = HYPR_WALLPAPER_DIR, /path/to/wallpapers
#
#   Terminal for scripts that spawn a terminal (WallpaperSelect.sh etc.):
#     env = HYPR_TERMINAL, ghostty
#
#   File manager for WaybarScripts.sh --files:
#     env = HYPR_FILE_MANAGER, thunar
