# user/render.conf — User technical rendering overrides
# Overrides sys/render.conf (render pipeline, xwayland, cursor).
# For visual decoration (blur, shadow, opacity, rounding) → user/decoration.conf
# For layout engine (dwindle/master/scrolling, gaps) → user/layout.conf
#
# Examples:
#   render {
#       direct_scanout = 1
#   }
#
#   cursor {
#       no_warps = false
#   }


