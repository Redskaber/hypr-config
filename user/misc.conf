# user/misc.conf — User misc overrides
# Overrides sys/misc.conf.
#
# Common overrides:
#   Enable VFR (variable frame rate, saves power):
#     misc { vfr = true }
#
#   Disable window swallow:
#     misc { enable_swallow = false }
#
#   Change VRR mode (0=off, 1=on, 2=fullscreen only):
#     misc { vrr = 1 }
