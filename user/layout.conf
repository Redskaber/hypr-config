# user/layout.conf — User layout engine override
# Overrides sys/layout.conf. Sets the startup layout.
#
# Layout cycle at runtime (SUPER+ALT+L):
#   scrolling → dwindle → master → scrolling
#
# Change the value below to start in a different layout.

general {
    layout = scrolling      # startup layout; hyprscrolling plugin required
}

# Example: start in dwindle instead
# general {
#     layout = dwindle
# }

# Example: tighter gaps
# general {
#     gaps_in  = 2
#     gaps_out = 4
# }

# Example: override hyprscrolling defaults
# plugin:hyprscrolling {
#     column_width             = 0.7
#     fullscreen_on_one_column = true
#     focus_fit_method         = 1    # 1 = fit (instead of center)
# }
