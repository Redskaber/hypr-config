# user/rules.conf — User window & layer rule additions
# Overrides and additions to sys/rules.conf.
# All system tags from sys/tags.conf are available here.
#
# To override a system rule, simply re-declare it — later wins.
# To add rules for a new tag defined in user/tags.conf, add them here.
#
# Examples:
#
#   # Assign browser to workspace 2
#   windowrule = workspace 2, match:tag browser
#
#   # Override im opacity
#   windowrule = opacity 1.0 1.0, match:tag im
#
#   # Float and center a specific app
#   windowrule = float on,  match:class ^(signal)$
#   windowrule = center on, match:class ^(signal)$
#   windowrule = size (monitor_w*0.5) (monitor_h*0.7), match:class ^(signal)$
#
#   # Rules for a new tag defined in user/tags.conf
#   windowrule = float on,  match:tag myapp
#   windowrule = center on, match:tag myapp
