# user/window-rules.conf — User window & layer rule additions
# Overrides and additions to core/window-rules.conf.
# Tags defined in core/window-tags.conf are available here.
# Add new tags here too if needed (tag + rules together).

# Example: float and center a specific app
# windowrule = float on,  match:class ^(signal)$
# windowrule = center on, match:class ^(signal)$
# windowrule = size (monitor_w*0.5) (monitor_h*0.7), match:class ^(signal)$

# Example: assign app to specific workspace
# windowrule = workspace 2, match:class ^(signal)$
