# user/decoration.conf — User visual decoration overrides
# Overrides sys/decoration.conf. $colorN variables are available.
#
# Examples:
#   decoration {
#       rounding = 16
#       blur {
#           size   = 8
#           passes = 3
#       }
#   }
#
#   general {
#       col.active_border = $color14
#   }
