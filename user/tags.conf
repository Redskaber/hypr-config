# user/tags.conf — User window tag additions
# Add personal app tags here. For each new tag, add matching rules in user/rules.conf.
#
# Available system tags (defined in sys/tags.conf):
#   browser  terminal  im  email  projects  notes  file-manager
#   multimedia  multimedia-video  screenshare
#   games  gamestore  viewer  text-editor  utils  calculator
#   settings  audio-mixer  wallpaper  notif
#   pip  auth-dialog  file-dialog  no-steal-focus  suppress-activate
#   $H_Cheat  $H_Settings  keybindings
#
# Example — add Signal to im tag:
#   windowrule = match:class ^(Signal)$, tag +im
#
# Example — add a personal app with a new tag:
#   windowrule = match:class ^(myapp)$, tag +myapp
#   (then add rules in user/rules.conf)
