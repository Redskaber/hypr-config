# user/input.conf — User input device overrides
# Overrides sys/input.conf. Source order in sys/default.conf guarantees this
# file is loaded after sys/input.conf.
#
# Common overrides:
#   Keyboard layout:
#     input { kb_layout = us,cn }
#
#   Mouse sensitivity:
#     input { sensitivity = -0.5 }
#
#   Disable natural scroll:
#     input { touchpad { natural_scroll = false } }
#
#   Left-handed mode:
#     input { left_handed = true }
