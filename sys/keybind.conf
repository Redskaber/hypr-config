# sys/keybinds.conf — Canonical Keybind Table (vendor defaults)
# User additions/overrides → user/keybinds.conf
# User app defaults ($M_terminal, $M_file_manager) → user/defaults.conf
#
# Bind flag reference:
#   bindd  = description variant (shows in KeyBinds.sh search)
#   binde  = repeat on hold
#   bindl  = active even when locked
#   bindm  = mouse bind
#   bindr  = release trigger
#   bindel = repeat + locked

# User defaults (terminal, file manager) loaded from user/defaults.conf
# $M_terminal and $files are available after that source.

################################################################################
# STANDARD — launchers & apps
################################################################################

bindd = $M,       D,      app launcher,           exec, pkill rofi || true && rofi -show drun -modi drun,filebrowser,run,window
bindd = $M,       B,      open default browser,   exec, xdg-open "https://"
bindd = $M,       Return, open terminal,          exec, $M_terminal
bindd = $M,       E,      file manager,           exec, $M_file_manager
bindd = $M,       A,      desktop overview,       exec, $S/desktop-overview.sh

################################################################################
# SYSTEM
################################################################################
bindd  = CTRL ALT,  Delete, exit Hyprland,             exec, hyprctl dispatch exit 0
bindd  = $M,        Q,      close active window,       killactive
bindd  = $M SHIFT,  Q,      terminate active process,  exec, $S/KillActiveProcess.sh
bindd  = CTRL ALT,  L,      lock screen,               exec, $S/LockScreen.sh
bindd  = CTRL ALT,  P,      power menu,                exec, $S/Wlogout.sh
bindd  = $M SHIFT,  N,      notification panel,        exec, swaync-client -t -sw

################################################################################
# FEATURES / EXTRAS
################################################################################
bindd = $M,           H,       help / cheat sheet,             exec,  $S/KeyHints.sh
bindd = $M ALT,       R,       refresh bar and menus,          exec,  $S/Refresh.sh
bindd = $M ALT,       E,       emoji menu,                     exec,  $S/RofiEmoji.sh
bindd = $M,           S,       web search,                     exec,  $S/RofiSearch.sh
bindd = $M CTRL,      S,       window switcher,                exec,    rofi -show window
bindd = $M ALT,       O,       toggle blur,                    exec,  $S/ChangeBlur.sh
bindd = $M SHIFT,     G,       toggle game mode,               exec,  $S/GameMode.sh
bindd = $M ALT,       L,       toggle layout master/dwindle,   exec,  $S/ChangeLayout.sh
bindd = $M ALT,       V,       clipboard manager,              exec,  $S/ClipManager.sh
bindd = $M CTRL,      R,       rofi theme selector,            exec,  $S/RofiThemeSelector.sh
bindd = $M CTRL SHIFT,R,       rofi theme selector (modified), exec,    pkill rofi || true && $S/RofiThemeSelector-modified.sh
bindd = $M SHIFT,     K,       search keybinds,                exec,  $S/KeyBinds.sh
bindd = $M SHIFT,     A,       animations menu,                exec,  $S/Animations.sh
bindd = $M,           N,       toggle night light,             exec,  $S/Hyprsunset.sh toggle
bindd = $M SHIFT,     E,       quick settings menu,            exec,  $S/Quick_Settings.sh

# Waybar
bindd = $M CTRL ALT,  B,       toggle waybar,                  exec,  pkill -SIGUSR1 waybar
bindd = $M CTRL,      B,       waybar styles menu,             exec,  $S/WaybarStyles.sh
bindd = $M ALT,       B,       waybar layout menu,             exec,  $S/WaybarLayout.sh

# S
bindd = $M SHIFT,     M,       online music,                   exec,  $S/RofiBeats.sh
bindd = $M,           W,       select wallpaper,               exec,  $S/WallpaperSelect.sh
bindd = $M SHIFT,     W,       wallpaper effects,              exec,  $S/WallpaperEffects.sh
bindd = CTRL ALT,     W,       random wallpaper,               exec,  $S/WallpaperRandom.sh
bindd = $M SHIFT,     O,       change oh-my-zsh theme,         exec,  $S/ZshChangeTheme.sh
bindd = $M ALT,       C,       calculator,                     exec,  $S/RofiCalc.sh


################################################################################
# WINDOW MANAGEMENT
################################################################################
 
bindd = $M SHIFT, F,      fullscreen,                     fullscreen
bindd = $M CTRL,  F,      maximize window,                fullscreen, 1
bindd = $M,       SPACE,  float current window,           togglefloating
bindd = $M ALT,   SPACE,  float all windows,              exec, hyprctl dispatch workspaceopt allfloat
bindd = $M SHIFT, Return, drop-down terminal,             exec, $S/Dropterminal.sh $M_terminal

# Magnify
bindd = $M ALT, mouse_down, zoom in,  exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {f=$2; if(f<1)f=1; print f*2.0}')"
bindd = $M ALT, mouse_up,   zoom out, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {f=$2; if(f<1)f=1; print f/2.0}')"
 
# Resize
binded = $M SHIFT, left,  resize left  (-50), resizeactive, -50 0
binded = $M SHIFT, right, resize right (+50), resizeactive,  50 0
binded = $M SHIFT, up,    resize up    (-50), resizeactive, 0 -50
binded = $M SHIFT, down,  resize down  (+50), resizeactive, 0  50
 
# Move
bindd = $M CTRL, left,  move window left,  movewindow, l
bindd = $M CTRL, right, move window right, movewindow, r
bindd = $M CTRL, up,    move window up,    movewindow, u
bindd = $M CTRL, down,  move window down,  movewindow, d
 
# Swap
bindd = $M ALT, left,  swap window left,  swapwindow, l
bindd = $M ALT, right, swap window right, swapwindow, r
bindd = $M ALT, up,    swap window up,    swapwindow, u
bindd = $M ALT, down,  swap window down,  swapwindow, d
 
# Focus
bindd = $M, left,  focus left,  movefocus, l
bindd = $M, right, focus right, movefocus, r
bindd = $M, up,    focus up,    movefocus, u
bindd = $M, down,  focus down,  movefocus, d
 
# Cycle windows
bindd = ALT, tab, cycle next window,    cyclenext
bindd = ALT, tab, bring active to top, bringactivetotop
 
# Groups
bindd = $M,      G,   toggle group,                 togglegroup
bindd = $M,      Tab, change group forward,         changegroupactive, f
bindd = $M SHIFT,Tab, change group back,            changegroupactive, b
bindd = $M CTRL, tab, change active in group,       changegroupactive
bindd = $M CTRL, K,   move left into group,         moveintogroup, l
bindd = $M CTRL, L,   move right into group,        moveintogroup, r
bindd = $M CTRL, H,   move active out of group,     moveoutofgroup
 
# Opacity toggle
bindd = $M CTRL, O, toggle active window opacity, exec, hyprctl setprop active opaque toggle
 
################################################################################
# LAYOUT — Master / Dwindle
################################################################################
 
# NOTE: J/K binds managed dynamically by scripts/KeybindsLayoutInit.sh
#       and scripts/ChangeLayout.sh to avoid layout-switch conflicts.
bindd = $M CTRL,  D,      remove master,            layoutmsg, removemaster
bindd = $M,       I,      add master,               layoutmsg, addmaster
bindd = $M CTRL,  Return, swap with master,         layoutmsg, swapwithmaster
bindd = $M SHIFT, I,      toggle split (dwindle),   layoutmsg
bindd = $M,       P,      toggle pseudo (dwindle),  pseudo
bindd = $M,       M,      set split ratio 0.3,      exec, hyprctl dispatch splitratio 0.3
 
################################################################################
# WORKSPACES
################################################################################
 
# Switch to workspace 1-10
bindd = $M, 1, workspace 1,  workspace, 1
bindd = $M, 2, workspace 2,  workspace, 2
bindd = $M, 3, workspace 3,  workspace, 3
bindd = $M, 4, workspace 4,  workspace, 4
bindd = $M, 5, workspace 5,  workspace, 5
bindd = $M, 6, workspace 6,  workspace, 6
bindd = $M, 7, workspace 7,  workspace, 7
bindd = $M, 8, workspace 8,  workspace, 8
bindd = $M, 9, workspace 9,  workspace, 9
bindd = $M, 0, workspace 10, workspace, 10
 
# Move active window to workspace
bindd = $M SHIFT, 1, move to workspace 1,  movetoworkspace, 1
bindd = $M SHIFT, 2, move to workspace 2,  movetoworkspace, 2
bindd = $M SHIFT, 3, move to workspace 3,  movetoworkspace, 3
bindd = $M SHIFT, 4, move to workspace 4,  movetoworkspace, 4
bindd = $M SHIFT, 5, move to workspace 5,  movetoworkspace, 5
bindd = $M SHIFT, 6, move to workspace 6,  movetoworkspace, 6
bindd = $M SHIFT, 7, move to workspace 7,  movetoworkspace, 7
bindd = $M SHIFT, 8, move to workspace 8,  movetoworkspace, 8
bindd = $M SHIFT, 9, move to workspace 9,  movetoworkspace, 9
bindd = $M SHIFT, 0, move to workspace 10, movetoworkspace, 10
 
# Scroll through workspaces
bindd = $M, mouse_down, scroll workspace down, workspace, e+1
bindd = $M, mouse_up,   scroll workspace up,   workspace, e-1
 
# Special workspace (scratchpad)
bindd = $M,       minus, toggle special workspace,  togglespecialworkspace, magic
bindd = $M SHIFT, minus, move to special workspace, movetoworkspace,        special:magic
 
# Move workspaces across monitors
bindd = $M CTRL, F9,  move workspace to left monitor,  movecurrentworkspacetomonitor, l
bindd = $M CTRL, F10, move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = $M CTRL, F11, move workspace to up monitor,    movecurrentworkspacetomonitor, u
bindd = $M CTRL, F12, move workspace to down monitor,  movecurrentworkspacetomonitor, d

################################################################################
# MEDIA / SPECIAL KEYS
################################################################################
 
bindeld = , xf86audioraisevolume, volume up,      exec, $S/Volume.sh --inc
bindeld = , xf86audiolowervolume, volume down,    exec, $S/Volume.sh --dec
bindld  = , xf86AudioMicMute,     toggle mic,     exec, $S/Volume.sh --toggle-mic
bindld  = , xf86audiomute,        toggle mute,    exec, $S/Volume.sh --toggle
bindld  = , xf86Sleep,            sleep,          exec, systemctl suspend
bindld  = , xf86Rfkill,           airplane mode,  exec, $S/AirplaneMode.sh
 
bindld = , xf86AudioPlayPause, play/pause,     exec, $S/MediaCtrl.sh --pause
bindld = , xf86AudioPause,     pause,          exec, $S/MediaCtrl.sh --pause
bindld = , xf86AudioPlay,      play,           exec, $S/MediaCtrl.sh --pause
bindld = , xf86AudioNext,      next track,     exec, $S/MediaCtrl.sh --nxt
bindld = , xf86AudioPrev,      previous track, exec, $S/MediaCtrl.sh --prv
bindld = , xf86audiostop,      stop,           exec, $S/MediaCtrl.sh --stop
 
################################################################################
# SCREENSHOTS
################################################################################
 
bindd = $M,           Print,       screenshot now,           exec, $S/ScreenShot.sh --now
bindd = $M SHIFT,     Print,       screenshot area,          exec, $S/ScreenShot.sh --area
bindd = $M CTRL,      Print,       screenshot in 5s,         exec, $S/ScreenShot.sh --in5
bindd = $M CTRL SHIFT,Print,       screenshot in 10s,        exec, $S/ScreenShot.sh --in10
bindd = ALT,          Print,       screenshot active window, exec, $S/ScreenShot.sh --active
bindd = $M SHIFT,     S,           screenshot (swappy),      exec, $S/ScreenShot.sh --swappy
 
################################################################################
# KEYBOARD LAYOUT SWITCH
################################################################################
 
bindlnd = ALT_L,   SHIFT_L, switch keyboard layout globally,    exec, $S/SwitchKeyboardLayout.sh
bindlnd = SHIFT_L, ALT_L,   switch keyboard layout per-window,  exec, $S/Tak0-Per-Window-Switch.sh
 
################################################################################
# MOUSE — move/resize
################################################################################
 
bindmd = $M, mouse:272, move window,   movewindow
bindmd = $M, mouse:273, resize window, resizewindow


