# sys/rules.conf — Window & Layer Rules
# ALL rules are tag-driven; tags defined in sys/tags.conf
# User additions → user/window-rules.conf
# Syntax: Hyprland ≥ 0.52.1 (match: prefix)

################################################################################
# POSITION
################################################################################

windowrule = center on, match:tag   im
windowrule = center on, match:tag   settings
windowrule = center on, match:tag   utils
windowrule = center on, match:tag   $H_Cheat
windowrule = center on, match:tag   $H_Settings
windowrule = center on, match:tag   keybindings
windowrule = center on, match:tag   auth-dialog

# Picture-in-Picture: top-right corner
windowrule = move (monitor_w*0.72) (monitor_h*0.07), match:title ^Picture-in-Picture$

################################################################################
# SIZE
################################################################################

windowrule = size (monitor_w*0.65) (monitor_h*0.9),  match:tag    $H_Cheat
windowrule = size (monitor_w*0.7)  (monitor_h*0.7),  match:tag    wallpaper
windowrule = size (monitor_w*0.7)  (monitor_h*0.7),  match:tag    settings
windowrule = size (monitor_w*0.6)  (monitor_h*0.7),  match:tag    im
windowrule = size (monitor_w*0.7)  (monitor_h*0.7),  match:tag    utils
windowrule = size 800 600,                            match:tag    audio-mixer

# Dialog sizing
windowrule = size (monitor_w*0.7) (monitor_h*0.6),    match:tag   file-dialog
windowrule = size (monitor_w*0.16) (monitor_h*0.12),  match:title ^(SDDM Background)$
# yad: requires class+title dual match — tag system cannot express compound conditions
windowrule = size (monitor_w*0.2)  (monitor_h*0.2),   match:class ^(yad)$ match:title ^(YAD)$

################################################################################
# FLOAT
################################################################################

# Float by tag
windowrule = float on, match:tag im
windowrule = float on, match:tag settings
windowrule = float on, match:tag utils
windowrule = float on, match:tag viewer
windowrule = float on, match:tag wallpaper
windowrule = float on, match:tag notif
windowrule = float on, match:tag $H_Cheat
windowrule = float on, match:tag $H_Settings
windowrule = float on, match:tag file-manager
windowrule = float on, match:tag multimedia_video
windowrule = float on, match:tag auth-dialog
windowrule = float on, match:tag pip
windowrule = float on, match:tag misc-apps

# Float sub-windows / dialogs only (not the main app window)
# These require class+negative-title compound match — cannot be expressed via tags.
windowrule = float on, match:class ^(codium|codium-url-handler|VSCodium|VSCode|code)$,  match:title negative:^(.*(codium|VSCodium|VSCode|code).*)$
windowrule = float on, match:class ^(com.heroicgameslauncher.hgl)$,                     match:title negative:(Heroic Games Launcher)
windowrule = float on, match:class ^([Ss]team)$,                                        match:title negative:^([Ss]team)$
windowrule = float on, match:class ^([Tt]hunar)$,                                       match:title negative:^(.*[Tt]hunar.*)$

################################################################################
# OPACITY
################################################################################

windowrule = opacity 0.92 0.85, match:tag   browser
windowrule = opacity 0.94 0.86, match:tag   im
windowrule = opacity 0.94 0.86, match:tag   multimedia
windowrule = opacity 0.90 0.80, match:tag   file-manager
windowrule = opacity 0.90 0.70, match:tag   terminal
windowrule = opacity 0.80 0.70, match:tag   settings
windowrule = opacity 0.85 0.75, match:tag   utils
windowrule = opacity 0.82 0.75, match:tag   viewer
windowrule = opacity 0.90 0.70, match:tag   wallpaper
windowrule = opacity 0.90 0.80, match:tag   projects
windowrule = opacity 0.80 0.70, match:tag   text-editor
windowrule = opacity 0.90 0.80, match:tag   misc-apps
windowrule = opacity 0.95 0.75, match:tag   pip
windowrule = opacity 0.92 0.85, match:tag   email

# multimedia_video: always full opacity, no blur
windowrule = opacity 1.0,    match:tag multimedia_video
windowrule = no_blur on,     match:tag multimedia_video

################################################################################
# VISUAL EFFECTS
################################################################################

windowrule = no_blur on, match:tag games

# screenshare tools: full opacity, no blur (obs, easyeffects)
windowrule = opacity 1.0,    match:tag screenshare
windowrule = no_blur on,     match:tag screenshare

# Picture-in-Picture decorations
windowrule = pin on,                match:tag pip
windowrule = keep_aspect_ratio on,  match:tag pip
windowrule = dim_around on,         match:tag pip

################################################################################
# SPECIAL BEHAVIORS
################################################################################

# Idle inhibit when fullscreen
windowrule = idle_inhibit fullscreen, match:fullscreen true

# Focus steal prevention
windowrule = no_initial_focus on,     match:tag no-steal-focus
windowrule = suppress_event activate, match:tag suppress-activate

# Games: borderless fullscreen (no_blur already set in VISUAL EFFECTS above)
windowrule = fullscreen 0,  match:tag       games

# Game stores: float main window
windowrule = float on,      match:tag       gamestore

################################################################################
# LAYER RULES
################################################################################

layerrule = blur on,           match:namespace ^(rofi|wlogout|quickshell:overview)$
layerrule = blur on,           match:namespace ^(notifications|swaync)$
layerrule = ignore_alpha 0.5,  match:namespace quickshell:overview
layerrule = dim_around on,     match:namespace ^(rofi|wlogout)$
layerrule = above_lock 1,      match:namespace notifications


