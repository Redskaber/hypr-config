# sys/rules.conf — Window & Layer Rules
# ─────────────────────────────────────────────────────────────────────────────
# ALL rules are tag-driven. Tags are defined in sys/tags.conf.
# User additions → user/rules.conf
#
# Principles:
#   • Rules are grouped by tag, not by rule type — easier to audit completeness.
#   • Each tag block contains ALL applicable rules for that tag.
#   • Direct match:class is only used for compound conditions the tag system
#     cannot express (class + negative:title). These are clearly annotated.
#   • Rule application order within a tag block: float → center → size → opacity
#     → visual effects → behavior.
#
# Syntax: Hyprland ≥ 0.52.1 (match: prefix)
# ─────────────────────────────────────────────────────────────────────────────

################################################################################
# BROWSER
# Tiled main window. Opacity. Idle inhibit when fullscreen.
# Sub-windows (popups, dialogs) float via compound rule below.
################################################################################

windowrule = opacity 1.00 0.85,           match:tag browser
windowrule = idle_inhibit fullscreen,     match:tag browser

# browser sub-windows: float dialogs that are not the main browser window
# (compound condition — cannot be expressed via tag alone)
windowrule = float on, match:class ^([Ff]irefox|org.mozilla.firefox)$,                match:title negative:^(Mozilla Firefox)$
windowrule = float on, match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?|google-chrome-stable|chrome-.+-Default)$, match:title negative:^(Google Chrome)$
windowrule = float on, match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$, match:title negative:^(Microsoft Edge)$

################################################################################
# TERMINAL
# Tiled. Transparency (active/inactive).
################################################################################

# windowrule = float on,                 match:tag terminal
windowrule = opacity 0.90 0.80,          match:tag terminal

################################################################################
# IM (instant messaging / chat)
# Float, center, sized. Moderate opacity.
################################################################################

windowrule = float on,                                        match:tag im
windowrule = center on,                                       match:tag im
windowrule = size (monitor_w*0.60) (monitor_h*0.70),          match:tag im
windowrule = opacity 0.94 0.86,                               match:tag im

################################################################################
# EMAIL
# Tiled main window (email clients are primary apps). Opacity only.
################################################################################

windowrule = opacity 0.95 0.88,          match:tag email

################################################################################
# PROJECTS (IDEs / code editors)
# Tiled main window. Slight opacity. Sub-windows float via compound rule.
################################################################################

windowrule = opacity 0.98 0.90,          match:tag projects

# projects sub-windows: float dialogs that are not the main IDE window
# (compound condition — cannot be expressed via tag alone)
windowrule = float on, match:class ^(codium|codium-url-handler|VSCodium|VSCode|code|zeditor)$, match:title negative:^(.*(codium|VSCodium|VSCode|Code|code).*)$
windowrule = float on, match:class ^(jetbrains-.+)$, match:title negative:^(.*(IDEA|PyCharm|WebStorm|GoLand|CLion|Rider|DataGrip|PhpStorm|RubyMine|AppCode|Android Studio).*)$

################################################################################
# NOTES (knowledge-base / note-taking apps — Obsidian, Logseq)
# Tiled primary workspace. Opacity only (same treatment as projects).
# Sub-windows float via compound rule.
################################################################################

windowrule = opacity 0.98 0.90,          match:tag notes

# notes sub-windows: float dialogs that are not the main notes window
# (compound condition — cannot be expressed via tag alone)
windowrule = float on, match:class ^(obsidian)$, match:title negative:^(Obsidian)$
windowrule = float on, match:class ^(logseq)$,   match:title negative:^(Logseq)$

################################################################################
# FILE-MANAGER
# Float, center, sized. Opacity. Sub-windows float via compound rule.
################################################################################

windowrule = float on,                                        match:tag file-manager
windowrule = center on,                                       match:tag file-manager
windowrule = size (monitor_w*0.70) (monitor_h*0.75),          match:tag file-manager
windowrule = opacity 0.92 0.82,                               match:tag file-manager

# file-manager sub-windows: float dialogs that are not the main FM window
# (compound condition — cannot be expressed via tag alone)
windowrule = float on, match:class ^([Tt]hunar)$,             match:title negative:^(.*[Tt]hunar.*)$
windowrule = float on, match:class ^(org.gnome.Nautilus)$,    match:title negative:^(Files)$

################################################################################
# MULTIMEDIA (audio players)
# Tiled or small float. Opacity.
################################################################################

windowrule = opacity 0.94 0.86,          match:tag multimedia

################################################################################
# MULTIMEDIA-VIDEO (video players)
# Float. Full opacity. No blur. Idle inhibit always (prevent screen sleep).
################################################################################

windowrule = float on,                   match:tag multimedia-video
windowrule = opacity 1.0,                match:tag multimedia-video
windowrule = no_blur on,                 match:tag multimedia-video
windowrule = idle_inhibit always,        match:tag multimedia-video

################################################################################
# SCREENSHARE (OBS, easyeffects)
# Tiled. Full opacity. No blur. Idle inhibit always — must not sleep during capture.
################################################################################

windowrule = opacity 1.0,                match:tag screenshare
windowrule = no_blur on,                 match:tag screenshare
windowrule = idle_inhibit always,        match:tag screenshare

# OBS sub-windows: float dialogs/docks that are not the main OBS window
# (compound condition — cannot be expressed via tag alone)
windowrule = float on, match:class ^([Oo]bs|com.obsproject.Studio)$, match:title negative:^(OBS[\s\d\.]*$)

################################################################################
# GAMES
# Borderless fullscreen. No blur. No rounding. Idle inhibit always.
################################################################################

windowrule = fullscreen 0,               match:tag games
windowrule = no_blur on,                 match:tag games
windowrule = rounding 0,                 match:tag games
windowrule = idle_inhibit always,        match:tag games

################################################################################
# GAMESTORE (Steam, Lutris launcher)
# Float main window, center, sized.
# Sub-windows float via compound rule.
################################################################################

windowrule = float on,                                        match:tag gamestore
windowrule = center on,                                       match:tag gamestore
windowrule = size (monitor_w*0.65) (monitor_h*0.80),          match:tag gamestore

# gamestore sub-windows
windowrule = float on, match:class ^([Ss]team)$,                    match:title negative:^([Ss]team)$
windowrule = float on, match:class ^(lutris)$,                      match:title negative:^(Lutris)$
windowrule = float on, match:class ^(com.heroicgameslauncher.hgl)$, match:title negative:(Heroic Games Launcher)

################################################################################
# VIEWER (document / image / system monitor)
# Float, center, sized. Opacity.
################################################################################

windowrule = float on,                                        match:tag viewer
windowrule = center on,                                       match:tag viewer
windowrule = size (monitor_w*0.70) (monitor_h*0.75),          match:tag viewer
windowrule = opacity 0.85 0.75,                               match:tag viewer

################################################################################
# TEXT-EDITOR (lightweight editors)
# Float, center, sized. Opacity.
################################################################################

windowrule = float on,                                        match:tag text-editor
windowrule = center on,                                       match:tag text-editor
windowrule = size (monitor_w*0.65) (monitor_h*0.75),          match:tag text-editor
windowrule = opacity 0.95 0.85,                               match:tag text-editor

################################################################################
# UTILS (power-user utilities)
# Float, center, sized. Opacity.
################################################################################

windowrule = float on,                                        match:tag utils
windowrule = center on,                                       match:tag utils
windowrule = size (monitor_w*0.65) (monitor_h*0.75),          match:tag utils
windowrule = opacity 0.92 0.82,                               match:tag utils

################################################################################
# CALCULATOR
# Float, center, small fixed size.
################################################################################

windowrule = float on,                   match:tag calculator
windowrule = center on,                  match:tag calculator
windowrule = size 480 640,               match:tag calculator

################################################################################
# SETTINGS (system configuration panels)
# Float, center, sized. Opacity.
################################################################################

windowrule = float on,                                        match:tag settings
windowrule = center on,                                       match:tag settings
windowrule = size (monitor_w*0.60) (monitor_h*0.70),          match:tag settings
windowrule = opacity 0.95 0.85,                               match:tag settings

################################################################################
# AUDIO-MIXER (pavucontrol, pwvucontrol)
# Float, center, fixed size. Separate from settings for precise sizing.
################################################################################

windowrule = float on,                   match:tag audio-mixer
windowrule = center on,                  match:tag audio-mixer
windowrule = size 900 600,               match:tag audio-mixer
windowrule = opacity 0.95 0.85,          match:tag audio-mixer

################################################################################
# WALLPAPER (wallpaper pickers)
# Float, center, sized. Opacity.
################################################################################

windowrule = float on,                                        match:tag wallpaper
windowrule = center on,                                       match:tag wallpaper
windowrule = size (monitor_w*0.70) (monitor_h*0.70),          match:tag wallpaper
windowrule = opacity 0.95 0.85,                               match:tag wallpaper

################################################################################
# NOTIF (swaync notification center)
# Float only — swaync manages its own position and size.
################################################################################

windowrule = float on,                   match:tag notif

################################################################################
# PIP (picture-in-picture)
# Float, pinned, top-right corner, keep aspect ratio, dim surroundings.
################################################################################

windowrule = float on,                                match:tag pip
windowrule = move (monitor_w*0.72) (monitor_h*0.07),  match:tag pip
windowrule = pin on,                                  match:tag pip
windowrule = keep_aspect_ratio on,                    match:tag pip
windowrule = opacity 0.95 0.75,                       match:tag pip
windowrule = dim_around on,                           match:tag pip

################################################################################
# AUTH-DIALOG (polkit, authentication prompts)
# Float, center, small size.
################################################################################

windowrule = float on,                                match:tag auth-dialog
windowrule = center on,                               match:tag auth-dialog
windowrule = size (monitor_w*0.35) (monitor_h*0.25),  match:tag auth-dialog

################################################################################
# FILE-DIALOG (open/save dialogs)
# Float, center, sized.
################################################################################

windowrule = float on,                                        match:tag file-dialog
windowrule = center on,                                       match:tag file-dialog
windowrule = size (monitor_w*0.65) (monitor_h*0.65),          match:tag file-dialog

################################################################################
# HELPER WINDOWS ($H_Cheat, $H_Settings, keybindings)
# Float, center, sized.
################################################################################

windowrule = float on,                                        match:tag $H_Cheat
windowrule = center on,                                       match:tag $H_Cheat
windowrule = opacity 0.85 0.85,                               match:tag $H_Cheat
windowrule = size (monitor_w*0.65) (monitor_h*0.90),          match:tag $H_Cheat

windowrule = float on,                                        match:tag $H_Settings
windowrule = center on,                                       match:tag $H_Settings
windowrule = size (monitor_w*0.65) (monitor_h*0.80),          match:tag $H_Settings

windowrule = float on,                                        match:tag keybindings
windowrule = center on,                                       match:tag keybindings
windowrule = size (monitor_w*0.65) (monitor_h*0.80),          match:tag keybindings

################################################################################
# BEHAVIOR — focus steal prevention
################################################################################

windowrule = no_initial_focus on,        match:tag no-steal-focus
windowrule = suppress_event activate,    match:tag suppress-activate

################################################################################
# GLOBAL BEHAVIORS (not tag-specific)
################################################################################

# Idle inhibit when any window is fullscreen
windowrule = idle_inhibit fullscreen,    match:fullscreen true

################################################################################
# LAYER RULES
################################################################################

layerrule = blur on,           match:namespace ^(rofi|wlogout|quickshell:overview)$
layerrule = blur on,           match:namespace ^(notifications|swaync)$
layerrule = ignore_alpha 0.5,  match:namespace quickshell:overview
layerrule = dim_around on,     match:namespace ^(rofi|wlogout)$
layerrule = above_lock 1,      match:namespace notifications
