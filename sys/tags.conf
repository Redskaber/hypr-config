# sys/tags.conf — Unified Window Tag Registry
# ─────────────────────────────────────────────────────────────────────────────
# Single source of truth for ALL window tags.
# Rules that consume these tags live in sys/rules.conf.
# User additions → user/tags.conf  (tag + matching rule in same block)
#
# Principles:
#   • One tag per semantic category — tags describe WHAT an app IS, not HOW it behaves.
#   • Behavior tags (no-steal-focus, suppress-activate) are separate from category tags.
#   • An app may carry multiple tags when it belongs to multiple categories.
#   • Compound conditions (class + negative:title) stay in rules.conf, not here.
#
# Syntax (Hyprland ≥ 0.52.1):
#   windowrule = match:class ^(AppClass)$, tag +tagname
# ─────────────────────────────────────────────────────────────────────────────

################################################################################
# CATEGORY TAGS — application type
################################################################################

# ── browser ──────────────────────────────────────────────────
# Main browser windows. Sub-windows float via compound rule in rules.conf.
windowrule = match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$,     tag +browser
windowrule = match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?|google-chrome-stable)$,     tag +browser
windowrule = match:class ^(chrome-.+-Default)$,                                                tag +browser
windowrule = match:class ^([Cc]hromium)$,                                                      tag +browser
windowrule = match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$,                  tag +browser
windowrule = match:class ^(Brave-browser(-beta|-dev|-unstable)?)$,                             tag +browser
windowrule = match:class ^([Tt]horium-browser|[Cc]achy-browser)$,                              tag +browser
windowrule = match:class ^(zen-alpha|zen|zen-browser)$,                                        tag +browser

# ── terminal ─────────────────────────────────────────────────
windowrule = match:class ^(Alacritty|kitty|kitty-dropterm|wezterm|foot|ghostty)$,              tag +terminal

# ── im (instant messaging / chat) ────────────────────────────
# Float + center + sized. Sub-windows handled by compound rule in rules.conf.
windowrule = match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$,                                 tag +im
windowrule = match:class ^([Ff]erdium)$,                                                       tag +im
windowrule = match:class ^([Ww]hatsapp-for-linux|wechat|qq)$,                                  tag +im
windowrule = match:class ^(ZapZap|com.rtosta.zapzap)$,                                         tag +im
windowrule = match:class ^(org.telegram.desktop|io.github.tdesktop_x64.TDesktop)$,             tag +im
windowrule = match:class ^(teams-for-linux|slack)$,                                            tag +im
windowrule = match:class ^(im.riot.Riot|Element)$,                                             tag +im

# ── email ────────────────────────────────────────────────────
# Main windows — tiled, not floated. Opacity only.
windowrule = match:class ^([Tt]hunderbird|org.gnome.Evolution)$,                               tag +email
windowrule = match:class ^(eu.betterbird.Betterbird)$,                                         tag +email

# ── projects (IDEs / code editors) ───────────────────────────
# Main windows — tiled. Sub-windows float via compound rule in rules.conf.
windowrule = match:class ^(codium|codium-url-handler|VSCodium)$,                               tag +projects
windowrule = match:class ^(VSCode|code|code-url-handler|zeditor)$,                             tag +projects
windowrule = match:class ^(jetbrains-.+)$,                                                     tag +projects

# ── file-manager ─────────────────────────────────────────────
# Float + center. Sub-windows (dialogs) float via compound rule in rules.conf.
windowrule = match:class ^([Tt]hunar|org.gnome.Nautilus|[Pp]cmanfm-qt|nemo)$,                  tag +file-manager
windowrule = match:class ^(app.drey.Warp)$,                                                    tag +file-manager

# ── multimedia (audio players) ───────────────────────────────
# Tiled or floating small windows. Opacity only.
windowrule = match:class ^([Aa]udacious|ncspot|listen1|lx-music-desktop)$,                     tag +multimedia

# ── multimedia-video (video players) ─────────────────────────
# Full opacity, no blur, idle inhibit, float.
windowrule = match:class ^([Mm]pv|vlc|com.github.rafostar.Clapper)$,                           tag +multimedia-video

# ── screenshare (recording / audio processing) ───────────────
# Full opacity, no blur — must not be visually degraded during capture.
windowrule = match:class ^([Oo]bs|com.obsproject.Studio)$,                                     tag +screenshare
windowrule = match:class ^(easyeffects|com.github.wwmm.easyeffects)$,                          tag +screenshare

# ── games ────────────────────────────────────────────────────
# Borderless fullscreen, no blur, no animations, idle inhibit.
windowrule = match:class ^(gamescope)$,                                                        tag +games
windowrule = match:class ^(steam_app_\d+)$,                                                    tag +games
windowrule = match:class ^(prismlauncher|lutris|com.heroicgameslauncher.hgl)$,                 tag +games

# ── gamestore (game launchers / stores) ──────────────────────
# Float main window, center.
windowrule = match:class ^([Ss]team)$,                                                         tag +gamestore
windowrule = match:title  ^([Ll]utris)$,                                                       tag +gamestore

# ── viewer (document / image / system monitor) ───────────────
# Float, center, opacity.
windowrule = match:class ^(evince|eog|org.gnome.Loupe|org.gnome.Evince)$,                      tag +viewer
windowrule = match:class ^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter)$, tag +viewer

# ── text-editor (lightweight editors) ────────────────────────
# Float, center, sized, opacity.
windowrule = match:class ^(org.gnome.TextEditor|mousepad|gedit|xed|kate)$,                     tag +text-editor

# ── utils (power-user utilities) ─────────────────────────────
# Float, center, sized, opacity. These are secondary/utility windows.
windowrule = match:class ^(obsidian)$,                                                         tag +utils
windowrule = match:class ^(rbw|seahorse)$,                                                     tag +utils
windowrule = match:class ^(clash-verge|qbittorrent)$,                                          tag +utils
windowrule = match:class ^(virt-manager)$,                                                     tag +utils
windowrule = match:class ^(fcitx5-config-qt|fcitx5)$,                                          tag +utils
windowrule = match:class ^(deluge|transmission-gtk|transmission-qt)$,                          tag +utils

# ── calculator ───────────────────────────────────────────────
# Small float, center.
windowrule = match:class ^(org.gnome.Calculator|[Qq]alculate-gtk|galculator)$,                 tag +calculator

# ── settings (system configuration panels) ───────────────────
# Float, center, sized. Pure system-config tools.
windowrule = match:class ^(nm-applet|nm-connection-editor|blueman-manager)$,                   tag +settings
windowrule = match:class ^(qt5ct|qt6ct)$,                                                      tag +settings
windowrule = match:class ^([Bb]aobab|org.gnome.[Bb]aobab)$,                                    tag +settings
windowrule = match:class ^(gnome-disks|wihotspot(-gui)?)$,                                     tag +settings
windowrule = match:class ^(file-roller|org.gnome.FileRoller)$,                                 tag +settings
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$,                        tag +settings
windowrule = match:class ^(nwg-displays|nwg-look)$,                                            tag +settings
windowrule = match:class ^(xdg-desktop-portal-gtk)$,                                           tag +settings
windowrule = match:title  ^(Kvantum Manager)$,                                                 tag +settings
windowrule = match:title  ^(ROG Control)$,                                                     tag +settings

# ── audio-mixer ──────────────────────────────────────────────
# Float, center, fixed size. Separate from +settings for precise sizing.
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$,   tag +audio-mixer

# ── wallpaper (wallpaper pickers) ────────────────────────────
# Float, center, sized.
windowrule = match:class ^([Ww]aytrogen|waypaper)$,                                            tag +wallpaper

# ── notif (notification center) ──────────────────────────────
# Float only — swaync manages its own position.
windowrule = match:class ^(swaync-control-center|swaync-notification-window|swaync-client)$,   tag +notif

################################################################################
# BEHAVIOR TAGS — how a window should behave (orthogonal to category)
################################################################################

# ── pip (picture-in-picture) ─────────────────────────────────
windowrule = match:title ^Picture-in-Picture$,                                                 tag +pip

# ── auth-dialog ──────────────────────────────────────────────
windowrule = match:title ^(Authentication Required)$,                                          tag +auth-dialog
windowrule = match:title ^(ROG Control)$,                                                      tag +auth-dialog

# ── file-dialog ──────────────────────────────────────────────
windowrule = match:title         ^(Save As|Add Folder to Workspace)$,                          tag +file-dialog
windowrule = match:initial_title ^(Open Files|Open File|Save File|Choose Files)$,              tag +file-dialog
windowrule = match:title         ^(SDDM Background)$,                                          tag +file-dialog

# ── no-steal-focus ───────────────────────────────────────────
# Apps known to steal focus on activation — suppress initial focus.
windowrule = match:class ^(wechat|qq)$,                                                        tag +no-steal-focus
windowrule = match:class ^(jetbrains-.+)$,                                                     tag +no-steal-focus
windowrule = match:title ^(wind.*)$,                                                           tag +no-steal-focus

# ── suppress-activate ────────────────────────────────────────
# Apps that send spurious activate events.
windowrule = match:class ^(vesktop)$,                                                          tag +suppress-activate

################################################################################
# HELPER / TOOL WINDOWS — keyed by $H_* variables from bootstrap/const.conf
################################################################################

windowrule = match:title ^(Quick Cheat Sheet)$,                                                tag +$H_Cheat
windowrule = match:title ^(Hyprland Settings)$,                                                tag +$H_Settings
windowrule = match:title ^(Keybindings)$,                                                      tag +keybindings
