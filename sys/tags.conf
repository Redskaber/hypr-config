# sys/window-tags.conf — Unified Tag Registry
# Single source of truth for all window/layer tags.
# Rules consuming these tags live in sys/rules.conf
# User additions → user/rules.conf  (tag + rule in same block)
#
# Syntax (Hyprland ≥ 0.52.1):
#   windowrule = match:class ^(pattern)$, tag +tagname

# ── Browsers ─────────────────────────────────────────────────
windowrule = match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$,          tag +browser
windowrule = match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$,                               tag +browser
windowrule = match:class ^(chrome-.+-Default)$,                                                     tag +browser
windowrule = match:class ^([Cc]hromium)$,                                                           tag +browser
windowrule = match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$,                       tag +browser
windowrule = match:class ^(Brave-browser(-beta|-dev|-unstable)?)$,                                  tag +browser
windowrule = match:class ^([Tt]horium-browser|[Cc]achy-browser)$,                                   tag +browser
windowrule = match:class ^(zen-alpha|zen|zen-browser)$,                                             tag +browser
windowrule = match:class ^(google-chrome-stable)$,                                                  tag +browser

# ── Terminals ────────────────────────────────────────────────
windowrule = match:class ^(Alacritty|kitty|kitty-dropterm|wezterm|foot)$,                           tag +terminal

# ── Instant messaging ────────────────────────────────────────
windowrule = match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$,                                      tag +im
windowrule = match:class ^([Ff]erdium)$,                                                            tag +im
windowrule = match:class ^([Ww]hatsapp-for-linux|wechat|qq)$,                                       tag +im
windowrule = match:class ^(ZapZap|com.rtosta.zapzap)$,                                              tag +im
windowrule = match:class ^(org.telegram.desktop|io.github.tdesktop_x64.TDesktop)$,                  tag +im
windowrule = match:class ^(teams-for-linux|slack)$,                                                 tag +im
windowrule = match:class ^(im.riot.Riot|Element)$,                                                  tag +im

# ── Projects / IDEs ──────────────────────────────────────────
windowrule = match:class ^(codium|codium-url-handler|VSCodium)$,                                    tag +projects
windowrule = match:class ^(VSCode|code|code-url-handler|zeditor)$,                                  tag +projects
windowrule = match:class ^(jetbrains-.+)$,                                                          tag +projects

# ── Email ────────────────────────────────────────────────────
windowrule = match:class ^([Tt]hunderbird|org.gnome.Evolution)$,                                    tag +email
windowrule = match:class ^(eu.betterbird.Betterbird)$,                                              tag +email

# ── File managers ────────────────────────────────────────────
windowrule = match:class ^([Tt]hunar|org.gnome.Nautilus|[Pp]cmanfm-qt|nemo)$,                       tag +file-manager
windowrule = match:class ^(app.drey.Warp)$,                                                         tag +file-manager

# ── Media (audio/video) ──────────────────────────────────────
windowrule = match:class ^([Aa]udacious|ncspot|listen1|lx-music-desktop)$,                          tag +multimedia
windowrule = match:class ^([Mm]pv|vlc|com.github.rafostar.Clapper)$,                                tag +multimedia_video
windowrule = match:class ^(obs|easyeffects)$,                                                       tag +screenshare

# ── Games ────────────────────────────────────────────────────
windowrule = match:class ^(gamescope)$,                                                             tag +games
windowrule = match:class ^(steam_app_\d+)$,                                                         tag +games
windowrule = match:class ^(prismlauncher|lutris|com.heroicgameslauncher.hgl)$,                      tag +games

# ── Game stores ──────────────────────────────────────────────
windowrule = match:class ^([Ss]team)$,                                                              tag +gamestore
windowrule = match:title ^([Ll]utris)$,                                                             tag +gamestore

# ── Utilities / Settings ────────────────────────────────────
windowrule = match:class ^(nm-applet|nm-connection-editor|blueman-manager)$,                        tag +settings
windowrule = match:class ^(qt5ct|qt6ct|[Yy]ad)$,                                                    tag +settings
windowrule = match:class ^([Bb]aobab|org.gnome.[Bb]aobab)$,                                         tag +settings
windowrule = match:class ^(gnome-disks|wihotspot(-gui)?)$,                                          tag +settings
windowrule = match:class ^(file-roller|org.gnome.FileRoller)$,                                      tag +settings
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$,                             tag +settings
windowrule = match:class ^(nwg-displays|nwg-look)$,                                                 tag +settings
windowrule = match:class (xdg-desktop-portal-gtk),                                                  tag +settings
windowrule = match:class ^([Rr]ofi)$,                                                               tag +settings
windowrule = match:title (Kvantum Manager),                                                         tag +settings
# audio-mixer: settings + dedicated tag for size rule
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$,        tag +settings
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$,        tag +audio-mixer
windowrule = match:class ^(obsidian|emacs|rbw|clash-verge|qbittorrent|virt-manager|fcitx5|seahorse|deluge)$, tag +utils
windowrule = match:class ^(org.gnome.TextEditor|mousepad|gedit)$,                                   tag +text-editor
# misc-apps: catch-all for apps needing opacity but no dedicated tag
windowrule = match:class ^(org.gnome.Calculator|[Qq]alculate-gtk|[Zz]oom|onedriver|onedriver-launcher)$, tag +misc-apps

# ── Viewers ──────────────────────────────────────────────────
windowrule = match:class ^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter)$, tag +viewer
windowrule = match:class ^(evince|eog|org.gnome.Loupe)$,                                            tag +viewer

# ── Wallpaper ────────────────────────────────────────────────
windowrule = match:class ^([Ww]aytrogen|waypaper)$,                                                 tag +wallpaper

# ── Notifications ────────────────────────────────────────────
windowrule = match:class ^(swaync-control-center|swaync-notification-window|swaync-client)$,        tag +notif

# ── Tool-specific ────────────────────────────────────────────
windowrule = match:title ^(Quick Cheat Sheet)$,                                                     tag +$H_Cheat
windowrule = match:title ^(Hyprland Settings)$,                                                     tag +$H_Settings
windowrule = match:title ^(Keybindings)$,                                                           tag +keybindings

# ── Auth dialogs ─────────────────────────────────────────────
windowrule = match:title ^(Authentication Required)$,                                               tag +auth-dialog
# ROG Control: settings (size/float) + auth-dialog (center)
windowrule = match:title ^(ROG Control)$,                                                           tag +settings
windowrule = match:title ^(ROG Control)$,                                                           tag +auth-dialog

# ── Picture-in-Picture ───────────────────────────────────────
windowrule = match:title ^Picture-in-Picture$,                                                      tag +pip

# ── File dialogs ─────────────────────────────────────────────
windowrule = match:title ^(Save As|Add Folder to Workspace)$,                                       tag +file-dialog
windowrule = match:initial_title ^(Open Files)$,                                                    tag +file-dialog

# ── Focus steal prevention ───────────────────────────────────
# wechat/qq: already tagged +im above; add no-steal-focus behavior tag
windowrule = match:class ^(wechat|qq)$,                                                             tag +no-steal-focus
# jetbrains: already tagged +projects above; add no-steal-focus behavior tag
windowrule = match:class ^(jetbrains-.+)$,                                                          tag +no-steal-focus
windowrule = match:title ^(wind.*)$,                                                                tag +no-steal-focus
windowrule = match:class ^(vesktop)$,                                                               tag +suppress-activate


