# sys/hyprlock.conf — Hypridle locked configuration
# Used by the hypridle daemon (exec-once = hypridle in sys/startup.conf).
# Original config submitted by https://github.com/SherLock707

source = ~/.config/hypr/bootstrap/const.conf                      # background
source = ~/.config/hypr/sys/policy/wallust/wallust-hyprland.conf  # color[#n]
$S = ~/.config/hypr/sys/scripts                                   # scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = $lock_background
    color = rgb(0,0,0) 
    blur_size = 3
    blur_passes = 2           # 0 disables blurring
    noise = 0.0117
    contrast = 1.3000         # Vibrant!!!
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = $color13
    font_size = 48 
    font_family = Victor Mono Bold Italic
    position = 0, -60
    halign = center
    valign = center
}

# Hour-Time (single horizontal time like 1080p variant)
label {
    monitor =
    # text = cmd[update:1000] echo "$(date +"%H:%M")"   # 24h option
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"  # AM/PM
    color = $color8
    font_size = 130
    font_family = JetBrainsMono Nerd Font ExtraBold 
    position = 0, -250
    halign = center
    valign = top
}

# USER
label {
    monitor =
    text =   $USER
    color = $color9
    font_size = 36
    font_family = Victor Mono Bold Oblique
    position = 0, 275
    halign = center
    valign = bottom
}


# INPUT FIELD
input-field {
    monitor =
    size = 230, 70
    outline_thickness = 2
    dots_size = 0.2     # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2  # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $color8
    inner_color = rgba(255, 255, 255, 0.1)
	  capslock_color = rgb(255,255,255)
    font_color = $color13
    fade_on_empty = false
    font_family = Victor Mono Bold Oblique
    placeholder_text = <i><span foreground="##ffffff99">🔒 Type Password</span></i>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}

# Keyboard LAYOUT
label {
    monitor =
    text = $LAYOUT
    color = $color8
    font_size = 14
    font_family = Victor Mono Bold Oblique
    position = 0, 70
    halign = center
    valign = bottom
}

# uptime
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p || $S/UptimeNixOS.sh)" </b>"
    color = $color8
    font_size = 24
    font_family = Victor Mono Bold Oblique
    position = 0, 0
    halign = right
    valign = bottom
}

# battery information
label {
    monitor =
    text = cmd[update:1000] echo "<b> "$($S/Battery.sh)" </b>"
    color = $color8
    font_size = 16
    font_family = Victor Mono Bold Oblique
    position = 0, 30
    halign = right
    valign = bottom
}


# weather edit the scripts for locations
label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat  "$HOME/.cache/.weather_cache"
    color = $color8
    font_size = 14
    font_family = Victor Mono Bold Oblique
    position = 50, 0
    halign = left
    valign = bottom
}


