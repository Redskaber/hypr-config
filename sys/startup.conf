# sys/startup.conf — Vendor-default exec-once services
# User additions → user/startup.conf
# Execution order: this file first, then user/startup.conf

# ── Environment propagation ───────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Wallpaper daemon ─────────────────────────────────────────
exec-once = swww-daemon --format xrgb
# exec-once = $S/WallpaperAutoChange.sh $wallDIR   # random rotation (30 min)
# exec-once = mpvpaper '*' -o "load-scripts=no no-audio --loop" $livewallpaper

# ── Auth agent ───────────────────────────────────────────────
exec-once = $S/Polkit.sh

# ── Keybind layout initialisation ────────────────────────────
# Sets SUPER+J/K globally once so layout switches don't double-bind.
exec-once = $S/KeybindsLayoutInit.sh

# ── Drop-down terminal (pre-spawn) ───────────────────────────
exec-once = $S/Dropterminal.sh kitty

# ── System tray / notification ───────────────────────────────
exec-once = nm-applet --indicator
exec-once = swaync
exec-once = waybar

# ── Overview shell ───────────────────────────────────────────
exec-once = qs -c overview          # Quickshell overview

# ── Clipboard ────────────────────────────────────────────────
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Idle / lock ──────────────────────────────────────────────
# NOTE: hypridle runs in its own process context; $sys variable is not available.
# Use the absolute path resolved at config-load time via $HYPR_CONFIG_DIR or hardcoded.
exec-once = hypridle -c ~/.config/hypr/sys/hypridle.conf

# ── Night light (restore previous state) ─────────────────────
exec-once = $S/Hyprsunset.sh init

# ── Disabled by default — enable via user/startup.conf ───────
# exec-once = $S/RainbowBorders.sh
# exec-once = $S/PortalHyprland.sh
# exec-once = blueman-applet
# exec-once = nm-tray                   # Ubuntu alternative to nm-applet


