# sys/default.conf — System pipeline
# user/const.conf is already sourced in bootstrap/default.conf (Stage 0).
# Each sys/* is followed immediately by its user/* override — incremental pattern.

# ── Hardware ─────────────────────────────────────────────────
source = $H/laptop.conf
source = $H/monitors.conf

# ── Policy (colors must be defined before render) ────────────
source = $P/default.conf

# ── Environment ──────────────────────────────────────────────
source = $sys/env.conf
source = $user/env.conf

# ── Core behaviour ───────────────────────────────────────────
source = $sys/misc.conf
source = $user/misc.conf
source = $sys/input.conf
source = $user/input.conf
source = $sys/layout.conf
source = $user/layout.conf

# ── Rendering (depends on $colorN from policy) ───────────────
source = $sys/decoration.conf
source = $user/decoration.conf
source = $sys/render.conf
source = $user/render.conf

# ── Startup ──────────────────────────────────────────────────
source = $sys/startup.conf
source = $user/startup.conf

# ── Keybinds ─────────────────────────────────────────────────
source = $sys/keybind.conf
source = $user/keybind.conf

# ── Window rules (tags first, then rules) ────────────────────
source = $sys/tags.conf
source = $user/tags.conf
source = $sys/rules.conf
source = $user/rules.conf


