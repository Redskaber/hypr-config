# hardware/laptop.conf — Laptop-specific binds & device config
# Merged from: configs/Laptops.conf + UserConfigs/Laptops.conf
# User lid/display overrides → sourced inline at bottom of this file.
#
# Set your touchpad device name here (run: hyprctl devices)
$Touchpad_Device = asue1209:00-04f3:319f-touchpad
$TOUCHPAD_ENABLED = true

# ── Keyboard brightness ───────────────────────────────────────
binde = , xf86KbdBrightnessDown, exec, $S/BrightnessKbd.sh --dec
binde = , xf86KbdBrightnessUp,   exec, $S/BrightnessKbd.sh --inc

# ── Monitor brightness ───────────────────────────────────────
binde = , xf86MonBrightnessDown, exec, $S/Brightness.sh --dec
binde = , xf86MonBrightnessUp,   exec, $S/Brightness.sh --inc

# ── ASUS ROG specific ────────────────────────────────────────
bind = , xf86Launch1, exec, rog-control-center               # Armory Crate button
bind = , xf86Launch3, exec, asusctl led-mode -n              # FN+F4 RGB profile
bind = , xf86Launch4, exec, asusctl profile -n               # FN+F5 fan profile

# ── Touchpad toggle ──────────────────────────────────────────
bind = , xf86TouchpadToggle, exec, $S/TouchPad.sh

# ── Screenshot via F6 (for laptops without PrtSc) ────────────
bind = $M,           F6, exec, $S/ScreenShot.sh --now
bind = $M SHIFT,     F6, exec, $S/ScreenShot.sh --area
bind = $M CTRL,      F6, exec, $S/ScreenShot.sh --in5
bind = $M ALT,       F6, exec, $S/ScreenShot.sh --in10
bind = ALT,          F6, exec, $S/ScreenShot.sh --active

# ── Touchpad device config ───────────────────────────────────
device {
    name    = $Touchpad_Device
    enabled = $TOUCHPAD_ENABLED
}

# ── Lid switch / display (user-managed file) ─────────────────
# Edit hardware/laptop-display.conf to set lid-close behaviour.
# This file is written by lid-switch bindl rules if enabled below.
source = $H/laptop-display.conf

# ── Lid switch rules (disabled by default) ───────────────────
# OPTION A — Simple: disable/enable eDP-1 directly
# bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 1"
# bindl = , switch:on:Lid Switch,  exec, hyprctl keyword monitor "eDP-1, disable"

# OPTION B — Via file (avoids wake on wallpaper change etc.)
# bindl = , switch:off:Lid Switch, exec, echo "monitor = eDP-1, preferred, auto, 1" > $HOME/.config/hypr/hardware/laptop-display.conf
# bindl = , switch:on:Lid Switch,  exec, echo "monitor = eDP-1, disable"            > $HOME/.config/hypr/hardware/laptop-display.conf
