# hardware/monitors.conf — Monitor configuration
# Managed by nwg-displays; manual edits may be overwritten on "Apply".
# Backup: hardware/monitor-profiles/<name>.conf
# Switch profiles at runtime: scripts/MonitorProfiles.sh
#
# https://wiki.hyprland.org/Configuring/Monitors/

# Default: let Hyprland pick best resolution and refresh rate
monitor = , preferred, auto, 1

# High Refresh Rate
monitor= , highrr, auto, 1

# High Resolution
monitor= , highres, auto, 1

# ── Common presets (uncomment one, or edit user override) ────
# monitor = eDP-1,   preferred,       auto,     1
# monitor = eDP-1,   2560x1440@165,   0x0,      1
# monitor = DP-1,    preferred,        auto,     1
# monitor = DP-3,    1920x1080@240,   auto,     1
# monitor = HDMI-A-1,preferred,       auto,     1

# ── VM / headless ────────────────────────────────────────────
# monitor = Virtual-1, 1920x1080@60, auto, 1

# ── Disable a monitor ────────────────────────────────────────
# monitor = name, disable

# ── Mirror ───────────────────────────────────────────────────
# monitor = DP-3,    1920x1080@60, 0x0, 1, mirror, DP-2
# monitor = HDMI-A-1,2560x1440@144,0x0,1, mirror, eDP-1

# ── 10-bit (HDR) — NOTE: some apps / OBS break with 10-bit ──
# monitor = , preferred, auto, 1, bitdepth, 10
