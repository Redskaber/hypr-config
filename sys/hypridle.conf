# sys/hypridle.conf — Hypridle timeout configuration
# Used by the hypridle daemon (exec-once = hypridle in sys/startup.conf).
# NOTE: Hyprland $variables are NOT available here — hypridle runs in its own context.
# this file is the canonical source — symlink or copy to ~/.config/hypr/hypridle.conf on deploy.

general {
    lock_cmd            = pidof hyprlock || hyprlock
    before_sleep_cmd    = loginctl lock-session
    after_sleep_cmd     = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Warn: 9 min idle
listener {
    timeout    = 540
    on-timeout = notify-send -i $I_notify " You are idle!"
    on-resume  = notify-send -i $I_notify " Oh! you're Back" " Hello !!!"
}

# Lock: 10 min idle
listener {
    timeout    = 600
    on-timeout = loginctl lock-session
}

