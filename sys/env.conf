# core/env.conf — Environment Variables (vendor defaults)
# User additions → user/env.conf (never edit this file)
# Ref: https://wiki.hyprland.org/Configuring/Environment-variables/

# ── Versioning ───────────────────────────────────────────────
env = DOTS_VERSION, 0.1.0

# ── Wayland toolkit backends ─────────────────────────────────
env = GDK_BACKEND,      wayland,x11,*
env = QT_QPA_PLATFORM,  wayland;xcb
env = CLUTTER_BACKEND,  wayland

# ── XDG session ──────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,  Hyprland
env = XDG_SESSION_DESKTOP,  Hyprland
env = XDG_SESSION_TYPE,     wayland

# ── Qt ───────────────────────────────────────────────────────
env = QT_AUTO_SCREEN_SCALE_FACTOR,          1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,  1
env = QT_QPA_PLATFORMTHEME,            qt6ct
env = QT_QUICK_CONTROLS_STYLE,         org.hyprland.style

# ── Scale (default 1× — override in user/env.conf for HiDPI) ─
env = GDK_SCALE,       1
env = QT_SCALE_FACTOR, 1

# ── Application-specific ─────────────────────────────────────
env = MOZ_ENABLE_WAYLAND,              1
env = ELECTRON_OZONE_PLATFORM_HINT,    auto

# ── NVIDIA (disabled; enable in user/env.conf if needed) ─────
# env = LIBVA_DRIVER_NAME,          nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,  nvidia
# env = NVD_BACKEND,                direct
# env = GBM_BACKEND,                nvidia-drm
# env = GSK_RENDERER,               ngl

# ── Aquamarine (disabled; enable for debugging) ───────────────
# env = AQ_TRACE, 1
# env = AQ_DRM_DEVICES, /dev/dri/card1:/dev/dri/card0
