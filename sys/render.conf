# sys/render.conf — Technical rendering (vendor defaults)
# Covers: render pipeline, xwayland compatibility, cursor behaviour.
# Visual decoration (colors, blur, shadow, opacity) → sys/decoration.conf
# User overrides → user/render.conf

render {
    direct_scanout = 0
}

xwayland {
    enabled             = true
    force_zero_scaling  = true
}

cursor {
    sync_gsettings_theme      = true
    no_hardware_cursors       = 2     # set to 1 to fully disable HW cursors
    enable_hyprcursor         = true
    warp_on_change_workspace  = 2
    no_warps                  = true
}


