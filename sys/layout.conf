# sys/layout.conf — Window layout engines
# Three layouts are supported: scrolling (default via user/layout.conf), dwindle, master.
# Runtime cycle: scrolling → dwindle → master → scrolling (via ChangeLayout.sh)
# User layout override → user/layout.conf

general {
    layout           = dwindle   # sys default; user/layout.conf overrides to scrolling
    border_size      = 2
    gaps_in          = 2
    gaps_out         = 4
    resize_on_border = true
}

dwindle {
    pseudotile           = true
    preserve_split       = true
    special_scale_factor = 0.8
}

master {
    new_status = master
    new_on_top = 1
    mfact      = 0.5
}

# hyprscrolling layout — https://github.com/hyprwm/hyprland-plugins/tree/main/hyprscrolling
# Loaded when layout = scrolling (set in user/layout.conf by default).
# Plugin must be loaded via hyprpm or hyprland plugin system.
#
# Config reference:
#   column_width            float [0-1]   default column width as fraction of monitor width
#   fullscreen_on_one_column bool         if only one column, make it fullscreen
#   explicit_column_widths  string        comma-separated widths for +conf/-conf cycling
#   focus_fit_method        int (0|1)     0=center, 1=fit when focusing a column
#   follow_focus            bool          move layout to make focused window visible
#   follow_debounce_ms      int           debounce time for focus events (ms)
plugin:hyprscrolling {
    column_width             = 0.5
    fullscreen_on_one_column = false
    explicit_column_widths   = 0.333, 0.5, 0.667, 1.0
    focus_fit_method         = 0
    follow_focus             = true
    follow_debounce_ms       = 0
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles   = true
    pass_mouse_when_bound    = false
}

