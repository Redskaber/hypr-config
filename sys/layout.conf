# sys/layout.conf — Window layout engines
# Active layout toggled at runtime via scripts/ChangeLayout.sh
# User layout override → user/layout.conf

general {
    layout         = dwindle   # default; runtime-switch via ChangeLayout.sh
    border_size    = 2
    gaps_in        = 2
    gaps_out       = 4
    resize_on_border = true
}

dwindle {
    pseudotile           = true
    preserve_split       = true
    special_scale_factor = 0.8
}

master {
    new_status = master
    new_on_top = 1
    mfact      = 0.5
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles   = true
    pass_mouse_when_bound    = false
}

